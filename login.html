<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Hebron Christian School</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="responsive.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">Hebron Christian School</a>
        <nav class="site-nav">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="courses.html">Courses</a>
          <a href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main class="auth-shell">
      <div class="container auth-grid">
        <div class="card auth-card">
          <p class="eyebrow">Welcome Back</p>
          <h1>Sign in to continue learning.</h1>
          <form id="login-form" class="auth-form">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" name="email" placeholder="you@example.com" required />
            
            <label for="login-password">Password</label>
            <div class="password-field">
              <input type="password" id="login-password" name="password" placeholder="Enter password" required />
              <button type="button" class="toggle-password" data-target="login-password" aria-label="Toggle password visibility">👁️</button>
            </div>
            
            <button type="submit" class="btn btn-primary">Login</button>
          </form>
          
          <p class="form-link"><a href="forgot-password.html">Forgot password?</a></p>
          <p class="form-link">No account? <a href="register.html">Create one</a></p>
          
          <div class="demo-box">
            <p><strong>Demo Accounts:</strong></p>
            <ul style="margin: 0.5rem 0; padding-left: 1rem;">
              <li>👤 Student: <code>student@hebron.org</code></li>
              <li>👨‍🏫 Teacher: <code>teacher@hebron.org</code></li>
              <li>👨‍💼 Admin: <code>admin@hebron.org</code></li>
            </ul>
            <p style="font-size: 0.85rem; color: var(--muted); margin-top: 0.5rem;">Password: any password (demo mode)</p>
          </div>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
