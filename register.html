<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Hebron Christian School</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="responsive.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">Hebron Christian School</a>
        <nav class="site-nav">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="courses.html">Courses</a>
          <a href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main class="auth-shell">
      <div class="container auth-grid">
        <div class="card auth-card">
          <p class="eyebrow">Join Hebron</p>
          <h1>Create your account.</h1>
          <form id="register-form" class="auth-form">
            <label for="register-name">Full Name</label>
            <input type="text" id="register-name" name="name" placeholder="Jane Doe" required minlength="2" />
            
            <label for="register-email">Email</label>
            <input type="email" id="register-email" name="email" placeholder="you@example.com" required />
            
            <label for="register-password">Password</label>
            <div class="password-field">
              <input type="password" id="register-password" name="password" placeholder="Choose a strong password" required minlength="6" />
              <button type="button" class="toggle-password" data-target="register-password" aria-label="Toggle password visibility">👁️</button>
            </div>
            <small class="form-help">At least 6 characters</small>
            
            <label for="register-role">Role</label>
            <select id="register-role" name="role" required>
              <option value="">Select your role</option>
              <option value="student">Student</option>
              <option value="teacher">Teacher</option>
              <option value="admin">Administrator</option>
            </select>
            
            <label for="academic-level">Academic Level</label>
            <select id="academic-level" name="academic-level" required>
              <option value="">Select academic level</option>
              <option value="primary">Primary School (Grades 1-7)</option>
              <option value="secondary">Secondary School (Forms 1-4)</option>
            </select>
            
            <div class="checkbox-field">
              <input type="checkbox" id="terms" name="terms" required />
              <label for="terms" style="display: inline; margin-left: 0.5rem; font-weight: normal;">I agree to the <a href="#" title="Terms of Service">Terms of Service</a></label>
            </div>
            
            <button type="submit" class="btn btn-primary">Register</button>
          </form>
          
          <p class="form-link">Already have an account? <a href="login.html">Login</a></p>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
